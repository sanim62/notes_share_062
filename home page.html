<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Sharing Club</title>
</head>
<body>
    <h1>Welcome to the Notes Sharing Club</h1>
    <p>A place to share and access PDF notes for various courses.</p>

    <h2>Actions</h2>
    <button>Register</button>
    <button>View Notes</button>
    <button>Upload File</button>
    <button>Download Files</button>

    <h2>Search Notes</h2>
    <form>
        <label for="department">Department:</label>
        <input type="text" id="department" name="department"><br><br>

        <label for="course">Course:</label>
        <input type="text" id="course" name="course"><br><br>

        <label for="chapter">Chapter:</label>
        <input type="text" id="chapter" name="chapter"><br><br>

        <label for="topic">Topic:</label>
        <input type="text" id="topic" name="topic"><br><br>

        <button type="submit">Search</button>
    </form>
</body>
</html>
